<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bollette di Casa</title>
<link rel="canonical" href="https://guxandobrat.github.io/House-Taxes/">
<meta name="description" content="Traccia le bollette di casa (luce, acqua, gas) dal cellulare. Grafici, storico, condivisione WhatsApp.">
<meta property="og:title" content="Bollette di Casa">
<meta property="og:description" content="Traccia le bollette di casa dal cellulare. Grafici, storico, condivisione WhatsApp.">
<meta property="og:url" content="https://guxandobrat.github.io/House-Taxes/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
:root{--pri:#6366f1;--pri-l:#a5b4fc;--pri-d:#4f46e5;--pri-g:rgba(99,102,241,.25);--luce:#f59e0b;--luce-bg:#fffbeb;--acqua:#06b6d4;--acqua-bg:#ecfeff;--gas:#f43f5e;--gas-bg:#fff1f2;--bg:#f1f5f9;--card:#fff;--tx:#1e293b;--tx2:#64748b;--tx3:#94a3b8;--brd:#e2e8f0;--ok:#10b981;--err:#ef4444;--r:16px;--rs:10px;--sh:0 1px 3px rgba(0,0,0,.06);--navh:68px;--hh:56px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow:hidden}input,select,button{font-family:inherit}
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg);overflow:hidden}
.hdr{height:var(--hh);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--brd);flex-shrink:0;z-index:50}
.hdr-t{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px}
.hdr-t .ver{font-size:9px;color:var(--tx3);font-weight:400}
.gear{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center}.gear:active{transform:scale(.9)}.gear svg{width:18px;height:18px;stroke:var(--tx2);fill:none;stroke-width:2}
.sp{position:absolute;top:var(--hh);right:10px;background:var(--card);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,.12);padding:14px;z-index:200;min-width:180px;opacity:0;transform:translateY(-8px) scale(.95);pointer-events:none;transition:all .2s}.sp.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.sp h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px}
.lo{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;font-size:13px;font-weight:500;color:var(--tx2)}.lo:hover{background:var(--bg)}.lo.on{background:#eef2ff;color:var(--pri)}.lo .ck{margin-left:auto;opacity:0;font-weight:700;color:var(--pri)}.lo.on .ck{opacity:1}
.scr{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:12px 16px calc(var(--navh)+30px);-webkit-overflow-scrolling:touch}.scr.on{display:flex;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes ci{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.nav{display:flex;background:var(--card);border-top:1px solid var(--brd);padding:6px 0 env(safe-area-inset-bottom,12px);position:absolute;bottom:0;left:0;right:0;z-index:100;height:var(--navh)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600}.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}.nb.on{color:var(--pri)}
.uc{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;box-shadow:var(--sh);border-left:4px solid transparent;animation:ci .35s ease both}
.uc:nth-child(1){animation-delay:.03s}.uc:nth-child(2){animation-delay:.08s}.uc:nth-child(3){animation-delay:.13s}
.uc.luce{border-left-color:var(--luce)}.uc.acqua{border-left-color:var(--acqua)}.uc.gas{border-left-color:var(--gas)}
.uc-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.uc-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.uc.luce .uc-ico{background:var(--luce-bg)}.uc.acqua .uc-ico{background:var(--acqua-bg)}.uc.gas .uc-ico{background:var(--gas-bg)}
.uc-nm{font-size:14px;font-weight:600}
.uc-f{display:flex;gap:8px}
.uf{flex:1;display:flex;flex-direction:column;gap:3px}
.uf label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px}
.uf input{width:100%;padding:9px 10px;border:1.5px solid var(--brd);border-radius:var(--rs);font-size:14px;background:var(--bg);outline:none;transition:all .2s;color:var(--tx)}
.uf input:focus{border-color:var(--pri);background:var(--card);box-shadow:0 0 0 3px var(--pri-g)}
.uf input[type=number]{font-weight:600;font-size:16px}
.eur-w{position:relative}.eur-w::after{content:'€';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tx3);font-weight:600;pointer-events:none}.eur-w input{padding-right:28px}
.mic-s{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;animation:ci .35s ease both;animation-delay:.23s}
.mic-b{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pri),var(--pri-d));box-shadow:0 4px 16px var(--pri-g);cursor:pointer;display:flex;align-items:center;justify-content:center}.mic-b svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}.mic-b:active{transform:scale(.92)}.mic-b.rec{background:linear-gradient(135deg,var(--err),#dc2626);animation:mp 1.2s infinite}
@keyframes mp{0%,100%{box-shadow:0 4px 16px rgba(239,68,68,.3)}50%{box-shadow:0 4px 32px rgba(239,68,68,.5)}}
.mic-l{font-size:11px;color:var(--tx3);margin-top:6px;font-weight:500}
.mic-h{font-size:10px;color:var(--tx3);font-style:italic;opacity:.7}
.au{font-size:11px;color:#b45309;background:var(--luce-bg);padding:8px 12px;border-radius:var(--rs);text-align:center;margin-bottom:10px;display:none}
.trsc{background:var(--luce-bg);border:1px solid #fde68a;border-radius:var(--rs);padding:10px;margin-bottom:10px;font-size:12px;color:#92400e;display:none}.trsc.show{display:block}.trsc b{font-size:10px;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
/* SAVE */
.sv-btn{width:100%;height:44px;flex-shrink:0;padding:0 16px;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,var(--ok),#059669);color:#fff;box-shadow:var(--sh);transition:all .2s}.sv-btn:active{transform:scale(.97)}.sv-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}
/* STORICO */
.mo-hdr{font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;padding:16px 0 8px;display:flex;align-items:center;gap:8px}.mo-hdr::after{content:'';flex:1;height:1px;background:var(--brd)}
.s-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);animation:ci .3s ease both}
.s-row{display:flex;align-items:center;gap:10px;padding:6px 0}.s-row+.s-row{border-top:1px solid var(--bg)}
.s-ico{font-size:16px;width:24px;text-align:center}.s-nm{font-size:13px;font-weight:600;flex:1}.s-val{font-size:15px;font-weight:700;text-align:right}.s-dt{font-size:10px;color:var(--tx3);margin-left:4px}
.s-zero{opacity:.35}
.s-acts{display:flex;gap:6px;padding-top:10px;margin-top:6px;border-top:1px solid var(--bg)}
.sa{flex:1;padding:7px;border:none;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}.sa:active{transform:scale(.95)}.sa svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.sa-ed{background:#eef2ff;color:var(--pri)}.sa-del{background:var(--gas-bg);color:var(--err)}.sa-sh{background:#dcfce7;color:#16a34a}
/* REPORT */
.r-sum{background:linear-gradient(135deg,var(--pri),#4338ca);border-radius:var(--r);padding:18px;margin-bottom:12px;color:#fff;text-align:center}.r-sum .big{font-size:26px;font-weight:800;margin:4px 0}.r-sum .sub{font-size:11px;opacity:.8}
.r-row{display:flex;gap:6px;margin-bottom:12px}
.r-st{flex:1;background:var(--card);border-radius:var(--rs);padding:12px 8px;text-align:center;box-shadow:var(--sh)}.r-st .lb{font-size:9px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}.r-st .vl{font-size:16px;font-weight:800;margin-top:3px}.r-st.luce .vl{color:var(--luce)}.r-st.acqua .vl{color:var(--acqua)}.r-st.gas .vl{color:var(--gas)}
/* MONTH NAV */
.mo-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;background:var(--card);border-radius:var(--r);padding:10px;box-shadow:var(--sh)}
.mo-nav button{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--brd);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx2)}.mo-nav button:active{background:var(--pri-l);color:#fff}
.mo-nav .mo-label{font-size:14px;font-weight:700;min-width:140px;text-align:center}
/* TABS */
.ch-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.ch-tab{padding:8px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--tx3);box-shadow:var(--sh);transition:all .2s}.ch-tab.on{background:var(--pri);color:#fff;box-shadow:0 2px 12px var(--pri-g)}
.ch-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh)}.ch-tit{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:10px}.ch-card canvas{max-height:240px}
.rb{width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;margin-bottom:6px;border:none}.rb:active{transform:scale(.97)}.rb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}.rb-pdf{background:var(--pri);color:#fff}.rb-bk{background:var(--bg);color:var(--tx2);border:1.5px solid var(--brd)!important}
.empty{text-align:center;padding:40px 16px;color:var(--tx3)}.empty-i{font-size:40px;margin-bottom:10px;opacity:.5}.empty p{font-size:13px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}.mbg.show{display:flex}
.mdl{background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:20px 16px env(safe-area-inset-bottom,20px);max-width:480px;width:100%;animation:su .3s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mdl h3{font-size:15px;font-weight:700;margin-bottom:8px}.mdl p{font-size:13px;color:var(--tx2);margin-bottom:14px}
.mbtn{display:flex;gap:6px}.mbtn button{flex:1;padding:11px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:none}.mbtn .cn{background:var(--bg);color:var(--tx2)}.mbtn .dg{background:var(--err);color:#fff}.mbtn button:active{transform:scale(.96)}
.fed{flex:1;padding:9px;border:1.5px solid var(--brd);border-radius:var(--rs);font-size:13px;background:var(--bg);outline:none;color:var(--tx)}.fed:focus{border-color:var(--pri)}
.toast{position:fixed;top:calc(var(--hh)+10px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--tx);color:#fff;padding:8px 18px;border-radius:30px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:var(--ok)}.toast.error{background:var(--err)}
.caw{position:fixed;inset:0;z-index:150;display:none}.caw.show{display:block}
@media print{.nav,.hdr,.sf,.mic-s,.au{display:none!important}.scr{overflow:visible!important;padding-bottom:0!important}#app{height:auto;overflow:visible}}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <div class="hdr-t">🏠 <span id="appTitle">Bollette di Casa</span></div>
    <button class="gear" onclick="togSet()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </header>
  <div class="caw" id="caw" onclick="togSet()"></div>
  <div class="sp" id="sp"><h4 id="spT">Lingua</h4>
    <div class="lo on" data-lang="it" onclick="setL('it')">🇮🇹 Italiano<span class="ck">✓</span></div>
    <div class="lo" data-lang="es" onclick="setL('es')">🇪🇸 Castellano<span class="ck">✓</span></div>
    <div class="lo" data-lang="pt" onclick="setL('pt')">🇧🇷 Portugues<span class="ck">✓</span></div>
  </div>
  <!-- REGISTRA -->
  <div class="scr on" id="s-reg">
    <div class="uc luce"><div class="uc-h"><div class="uc-ico">⚡</div><div class="uc-nm" data-i18n="luce">Luce</div></div><div class="uc-f"><div class="uf" style="flex:1.2"><label>EUR</label><div class="eur-w"><input type="number" step="0.01" id="iL" placeholder="0.00" inputmode="decimal"></div></div><div class="uf"><label data-i18n="iDate">Data fattura</label><input type="date" id="iLD"></div></div></div>
    <div class="uc acqua"><div class="uc-h"><div class="uc-ico">💧</div><div class="uc-nm" data-i18n="acqua">Acqua</div></div><div class="uc-f"><div class="uf" style="flex:1.2"><label>EUR</label><div class="eur-w"><input type="number" step="0.01" id="iA" placeholder="0.00" inputmode="decimal"></div></div><div class="uf"><label data-i18n="iDate">Data fattura</label><input type="date" id="iAD"></div></div></div>
    <div class="uc gas"><div class="uc-h"><div class="uc-ico">🔥</div><div class="uc-nm">Gas</div></div><div class="uc-f"><div class="uf" style="flex:1.2"><label>EUR</label><div class="eur-w"><input type="number" step="0.01" id="iG" placeholder="0.00" inputmode="decimal"></div></div><div class="uf"><label data-i18n="iDate">Data fattura</label><input type="date" id="iGD"></div></div></div>
    <button class="sv-btn" onclick="save()" style="margin-top:8px"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span data-i18n="save">Salva</span></button>
    <div class="trsc" id="trsc"><b data-i18n="und">Capito:</b><div id="trT"></div></div>
    <div class="mic-s" id="micS"><button class="mic-b" id="micB" onclick="togR()"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button><div class="mic-l" id="micL" data-i18n="tap">Tocca per registrare</div><div class="mic-h" data-i18n="hint">"Luce 85, acqua 42, gas 63"</div></div>
    <div class="au" id="au" data-i18n="noMic">Microfono non disponibile.</div>
  </div>
  <!-- STORICO -->
  <div class="scr" id="s-sto"><div id="hList"></div></div>
  <!-- REPORT -->
  <div class="scr" id="s-rep">
    <div id="repE"><div class="empty"><div class="empty-i">📊</div><p data-i18n="noD">Registra le bollette per vedere il report</p></div></div>
    <div id="repC" style="display:none">
      <div class="mo-nav"><button onclick="navMo(-1)">◀</button><div class="mo-label" id="moLabel">Tutti</div><button onclick="navMo(1)">▶</button></div>
      <div class="r-sum"><div class="sub">Totale</div><div class="big" id="rTotal">--</div><div style="height:1px;background:rgba(255,255,255,.2);margin:8px 0"></div><div class="sub" id="rSumLbl"></div><div class="big" style="font-size:20px" id="rPP">--</div></div>
      <div class="r-row"><div class="r-st luce"><div class="lb" data-i18n="luce">Luce</div><div class="vl" id="rL">--</div></div><div class="r-st acqua"><div class="lb" data-i18n="acqua">Acqua</div><div class="vl" id="rA">--</div></div><div class="r-st gas"><div class="lb">Gas</div><div class="vl" id="rG">--</div></div></div>
      <div class="ch-tabs" id="chTabs"></div>
      <div class="ch-card"><div class="ch-tit" id="chTit"></div><canvas id="chCanvas"></canvas></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="mbg" id="mDel"><div class="mdl"><h3 data-i18n="cDel">Eliminare?</h3><p id="mDelT"></p><div class="mbtn"><button class="cn" onclick="cDel()" data-i18n="cancel">Annulla</button><button class="dg" onclick="dDel()" data-i18n="del">Elimina</button></div></div></div>
  <div class="mbg" id="mEdit"><div class="mdl"><h3 data-i18n="eRec">Modifica</h3><div style="display:flex;flex-direction:column;gap:8px"><div style="display:flex;gap:6px;align-items:center"><span>⚡</span><input type="number" step="0.01" id="eL" class="fed" inputmode="decimal"><input type="date" id="eLD" class="fed"></div><div style="display:flex;gap:6px;align-items:center"><span>💧</span><input type="number" step="0.01" id="eA" class="fed" inputmode="decimal"><input type="date" id="eAD" class="fed"></div><div style="display:flex;gap:6px;align-items:center"><span>🔥</span><input type="number" step="0.01" id="eG" class="fed" inputmode="decimal"><input type="date" id="eGD" class="fed"></div></div><div class="mbtn" style="margin-top:14px"><button class="cn" onclick="cEdit()" data-i18n="cancel">Annulla</button><button class="dg" style="background:var(--pri)" onclick="dEdit()" data-i18n="save">Salva</button></div></div></div>
  <nav class="nav">
    <button class="nb on" data-s="reg"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span data-i18n="nReg">Registra</span></button>
    <button class="nb" data-s="sto"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span data-i18n="nSto">Storico</span></button>
    <button class="nb" data-s="rep"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span data-i18n="nRep">Report</span></button>
  </nav>
</div>
<script>
const $=id=>document.getElementById(id);

// ====== DATABASE: ONE RECORD PER MONTH ======
const db=new Dexie('BolletteFinal');
db.version(1).stores({records:'++id,&month'});
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();
// &month = unique index — only 1 record per month

// ====== SAVE — UPSERT BY MONTH ======
let lastSaved=null;
async function save(){
  const td=new Date().toISOString().slice(0,10);
  const entries=[
    {k:'luce',v:parseFloat($('iL').value)||0,d:$('iLD').value||td,dk:'luceDate'},
    {k:'acqua',v:parseFloat($('iA').value)||0,d:$('iAD').value||td,dk:'acquaDate'},
    {k:'gas',v:parseFloat($('iG').value)||0,d:$('iGD').value||td,dk:'gasDate'}
  ].filter(e=>e.v>0);
  if(!entries.length){toast(t('fill1'),'error');return}
  try{
    // Group entries by month (YYYY-MM from their date)
    const byMo={};
    entries.forEach(e=>{const mo=e.d.slice(0,7);if(!byMo[mo])byMo[mo]={};byMo[mo][e.k]=e});
    for(const[mo,utils]of Object.entries(byMo)){
      const existing=await db.records.where('month').equals(mo).first();
      if(existing){
        // Block if utility already has a value for this month
        const dupes=[];
        if(utils.luce&&existing.luce)dupes.push(t('luce'));
        if(utils.acqua&&existing.acqua)dupes.push(t('acqua'));
        if(utils.gas&&existing.gas)dupes.push('Gas');
        if(dupes.length){toast(dupes.join(', ')+' — '+fMo(mo)+' '+t('alreadyExists'),'error');return}
        // Only add new utilities
        const upd={updatedAt:new Date().toISOString()};
        if(utils.luce){upd.luce=utils.luce.v;upd.luceDate=utils.luce.d}
        if(utils.acqua){upd.acqua=utils.acqua.v;upd.acquaDate=utils.acqua.d}
        if(utils.gas){upd.gas=utils.gas.v;upd.gasDate=utils.gas.d}
        upd.abitanti=ab;
        await db.records.update(existing.id,upd);
      }else{
        await db.records.add({month:mo,luce:utils.luce?utils.luce.v:0,luceDate:utils.luce?utils.luce.d:'',acqua:utils.acqua?utils.acqua.v:0,acquaDate:utils.acqua?utils.acqua.d:'',gas:utils.gas?utils.gas.v:0,gasDate:utils.gas?utils.gas.d:'',abitanti:ab,createdAt:new Date().toISOString()});
      }
    }
    // Build lastSaved for sharing
    const firstMo=Object.keys(byMo)[0];
    lastSaved=await db.records.where('month').equals(firstMo).first();
    toast(t('sOk'),'success');
    ['iL','iA','iG'].forEach(id=>$(id).value='');
    $('trsc').classList.remove('show');$('iLD').value=td;$('iAD').value=td;$('iGD').value=td;
    await rHist();await rRep();
  }catch(e){console.error(e);toast('Err: '+e.message,'error')}
}

// ====== SHARE ======
function doShare(){
  if(!lastSaved)return;const r=lastSaved;
  const ln=['🏠 '+t('title'),''];
  if(r.luce)ln.push('⚡ '+t('luce')+': '+r.luce.toFixed(2)+'€');
  if(r.acqua)ln.push('💧 '+t('acqua')+': '+r.acqua.toFixed(2)+'€');
  if(r.gas)ln.push('🔥 Gas: '+r.gas.toFixed(2)+'€');
  const tot=r.luce+r.acqua+r.gas;ln.push('','💰 Total: '+tot.toFixed(2)+'€','👤 '+t('cpp')+': '+(tot/r.abitanti).toFixed(2)+'€');
  const msg=ln.join('\n');
  if(navigator.share)navigator.share({title:t('title'),text:msg}).catch(()=>{});
  else window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(msg),'_blank');
}
async function shareRec(id){const r=await db.records.get(id);if(r){lastSaved=r;doShare()}}

    if(ym!==lastYm){const[y,m]=ym.split('-');html+=`<div class="mo-hdr">${T[lang].mf[parseInt(m)-1]} ${y}</div>`;lastYm=ym}

      <div class="s-row${zG?' s-zero':''}"><span class="s-ico">🔥</span><span class="s-nm">Gas</span><span class="s-val">${zG?'—':r.gas.toFixed(2)+'€'}</span>${!zG&&r.gasDate?'<span class="s-dt">'+fDs(r.gasDate)+'</span>':''}</div>

async function dEdit(){
  if(!edId)return;

  const dates=[$('eLD').value,$('eAD').value,$('eGD').value].filter(Boolean).sort();
  const newMo=dates.length?dates[0].slice(0,7):null;
  const upd={luce:parseFloat($('eL').value)||0,luceDate:$('eLD').value,acqua:parseFloat($('eA').value)||0,acquaDate:$('eAD').value,gas:parseFloat($('eG').value)||0,gasDate:$('eGD').value};

  await db.records.update(edId,upd);
  cEdit();toast(t('eOk'),'success');await rHist();await rRep();

function navMo(dir){
  moIdx+=dir;

  if(moIdx>=allMonths.length)moIdx=-1;

}

async function rRep(){
  allRecs=await db.records.orderBy('month').toArray();
  if(!allRecs.length){$('repE').style.display='block';$('repC').style.display='none';return}
  $('repE').style.display='none';$('repC').style.display='block';
  allMonths=allRecs.map(r=>r.month);
  if(moIdx>=allMonths.length)moIdx=-1;

  // Filtered records for summary + most charts
  const filt=moIdx===-1?allRecs:[allRecs[moIdx]].filter(Boolean);
  $('moLabel').textContent=moIdx===-1?t('all'):fMo(allMonths[moIdx]);

  let sL=0,sA=0,sG=0;filt.forEach(r=>{sL+=r.luce;sA+=r.acqua;sG+=r.gas});
  const sT=sL+sA+sG,avgAb=filt.reduce((s,r)=>s+r.abitanti,0)/filt.length||4,nMo=filt.length||1;
  $('rTotal').textContent=sT.toFixed(2)+' €';
  $('rSumLbl').textContent=t('cpp')+' ('+Math.round(avgAb)+' '+t('ab')+')';
  $('rPP').textContent=(sT/nMo/avgAb).toFixed(2)+' €';
  $('rL').textContent=sL.toFixed(2)+'€';$('rA').textContent=sA.toFixed(2)+'€';$('rG').textContent=sG.toFixed(2)+'€';

  const tn={bar:t('tBar'),line:t('tLine'),pie:t('tPie'),person:t('tPerson')};
  $('chTabs').innerHTML=TABS.map(tb=>`<button class="ch-tab${tb===curTab?' on':''}" onclick="curTab='${tb}';rRep()">${tn[tb]}</button>`).join('');

// ====== MIGRATE OLD DBS ======
(async function(){
  const oldNames=['ContasCasaDB','BolletteCasaDB','BolletteCasaV2','BolletteCasaV3'];
  for(const name of oldNames){
    try{
      if(!await Dexie.exists(name))continue;
      const old=new Dexie(name);old.version(1).stores({records:'++id'});await old.open();
      const recs=await old.records.toArray();
      for(const r of recs){
        const mo=r.month||r.luceDate?.slice(0,7)||r.acquaDate?.slice(0,7)||r.gasDate?.slice(0,7)||r.createdAt?.slice(0,7)||'2026-01';
        const ex=await db.records.where('month').equals(mo).first();
        if(ex){
          const upd={};
          if(r.luce&&!ex.luce){upd.luce=r.luce;upd.luceDate=r.luceDate}
          if(r.acqua&&!ex.acqua){upd.acqua=r.acqua;upd.acquaDate=r.acquaDate}
          if(r.gas&&!ex.gas){upd.gas=r.gas;upd.gasDate=r.gasDate}
          if(Object.keys(upd).length)await db.records.update(ex.id,upd);
